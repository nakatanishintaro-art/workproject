name: 案件自動収集 (毎日9時 JST)

on:
  schedule:
    # 毎日 00:00 UTC = 09:00 JST
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  collect-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 案件収集を実行
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DB_PATH: ./data/jobs.db
          LOG_LEVEL: INFO
          MAX_JOBS_PER_RUN: 100
          MIN_SCORE_TO_NOTIFY: 60
          TOP_N_JOBS: 10
          SCRAPE_DELAY_SECONDS: 2
        run: python3 main.py

      - name: ログをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: DBをアーティファクトとして保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-db-${{ github.run_number }}
          path: data/jobs.db
          retention-days: 30
